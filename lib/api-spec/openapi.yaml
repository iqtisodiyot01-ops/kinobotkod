openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Kino Bot API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: movies
    description: Movie operations
  - name: users
    description: User operations
  - name: bot
    description: Bot operations
  - name: analytics
    description: Analytics operations
  - name: broadcast
    description: Broadcast operations
  - name: categories
    description: Category operations

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /movies:
    get:
      operationId: listMovies
      tags: [movies]
      summary: List all movies
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: search
          in: query
          schema:
            type: string
        - name: category
          in: query
          schema:
            type: string
        - name: language
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of movies
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MovieListResponse"
    post:
      operationId: createMovie
      tags: [movies]
      summary: Create a new movie
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateMovieBody"
      responses:
        "201":
          description: Created movie
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Movie"

  /movies/{id}:
    get:
      operationId: getMovie
      tags: [movies]
      summary: Get movie by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Movie details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Movie"
    put:
      operationId: updateMovie
      tags: [movies]
      summary: Update a movie
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateMovieBody"
      responses:
        "200":
          description: Updated movie
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Movie"
    delete:
      operationId: deleteMovie
      tags: [movies]
      summary: Delete a movie
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /movies/{id}/toggle-active:
    post:
      operationId: toggleMovieActive
      tags: [movies]
      summary: Toggle movie active status
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Toggled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Movie"

  /users:
    get:
      operationId: listUsers
      tags: [users]
      summary: List all bot users
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: search
          in: query
          schema:
            type: string
        - name: blocked
          in: query
          schema:
            type: boolean
      responses:
        "200":
          description: List of users
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserListResponse"

  /users/{id}:
    get:
      operationId: getUser
      tags: [users]
      summary: Get user by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: User details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BotUser"
    delete:
      operationId: deleteUser
      tags: [users]
      summary: Delete a user
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /users/{id}/toggle-block:
    post:
      operationId: toggleUserBlock
      tags: [users]
      summary: Block or unblock a user
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Toggled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BotUser"

  /analytics/summary:
    get:
      operationId: getAnalyticsSummary
      tags: [analytics]
      summary: Get analytics summary
      responses:
        "200":
          description: Analytics summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnalyticsSummary"

  /analytics/daily-stats:
    get:
      operationId: getDailyStats
      tags: [analytics]
      summary: Get daily statistics
      parameters:
        - name: days
          in: query
          schema:
            type: integer
            default: 30
      responses:
        "200":
          description: Daily stats
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DailyStat"

  /analytics/top-movies:
    get:
      operationId: getTopMovies
      tags: [analytics]
      summary: Get top requested movies
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 10
      responses:
        "200":
          description: Top movies
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TopMovie"

  /broadcast:
    post:
      operationId: sendBroadcast
      tags: [broadcast]
      summary: Send broadcast message to all users
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BroadcastBody"
      responses:
        "200":
          description: Broadcast started
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BroadcastResult"

  /broadcast/history:
    get:
      operationId: getBroadcastHistory
      tags: [broadcast]
      summary: Get broadcast history
      responses:
        "200":
          description: Broadcast history
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/BroadcastRecord"

  /categories:
    get:
      operationId: listCategories
      tags: [categories]
      summary: List all categories
      responses:
        "200":
          description: Categories
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Category"
    post:
      operationId: createCategory
      tags: [categories]
      summary: Create a category
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCategoryBody"
      responses:
        "201":
          description: Created category
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Category"

  /categories/{id}:
    delete:
      operationId: deleteCategory
      tags: [categories]
      summary: Delete a category
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /bot/settings:
    get:
      operationId: getBotSettings
      tags: [bot]
      summary: Get bot settings
      responses:
        "200":
          description: Bot settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BotSettings"
    put:
      operationId: updateBotSettings
      tags: [bot]
      summary: Update bot settings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateBotSettingsBody"
      responses:
        "200":
          description: Updated settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BotSettings"

  /bot/commands:
    get:
      operationId: getBotCommands
      tags: [bot]
      summary: Get configured bot commands
      responses:
        "200":
          description: Bot commands
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/BotCommand"
    put:
      operationId: updateBotCommands
      tags: [bot]
      summary: Update bot commands
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateBotCommandsBody"
      responses:
        "200":
          description: Updated commands
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/BotCommand"

  /bot/status:
    get:
      operationId: getBotStatus
      tags: [bot]
      summary: Get bot running status
      responses:
        "200":
          description: Bot status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BotStatus"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    Movie:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        titleUz:
          type: string
        description:
          type: string
        year:
          type: integer
        language:
          type: string
        category:
          type: string
        fileId:
          type: string
        thumbnailUrl:
          type: string
        duration:
          type: integer
        views:
          type: integer
        isActive:
          type: boolean
        createdAt:
          type: string
      required:
        - id
        - title
        - isActive
        - views
        - createdAt

    CreateMovieBody:
      type: object
      properties:
        title:
          type: string
        titleUz:
          type: string
        description:
          type: string
        year:
          type: integer
        language:
          type: string
        category:
          type: string
        fileId:
          type: string
        thumbnailUrl:
          type: string
        duration:
          type: integer
        isActive:
          type: boolean
      required:
        - title
        - fileId

    UpdateMovieBody:
      type: object
      properties:
        title:
          type: string
        titleUz:
          type: string
        description:
          type: string
        year:
          type: integer
        language:
          type: string
        category:
          type: string
        fileId:
          type: string
        thumbnailUrl:
          type: string
        duration:
          type: integer
        isActive:
          type: boolean

    MovieListResponse:
      type: object
      properties:
        movies:
          type: array
          items:
            $ref: "#/components/schemas/Movie"
        total:
          type: integer
        page:
          type: integer
        totalPages:
          type: integer
      required:
        - movies
        - total
        - page
        - totalPages

    BotUser:
      type: object
      properties:
        id:
          type: integer
        telegramId:
          type: string
        username:
          type: string
        firstName:
          type: string
        lastName:
          type: string
        isBlocked:
          type: boolean
        referralCode:
          type: string
        referredBy:
          type: string
        totalRequests:
          type: integer
        joinedAt:
          type: string
      required:
        - id
        - telegramId
        - isBlocked
        - totalRequests
        - joinedAt

    UserListResponse:
      type: object
      properties:
        users:
          type: array
          items:
            $ref: "#/components/schemas/BotUser"
        total:
          type: integer
        page:
          type: integer
        totalPages:
          type: integer
      required:
        - users
        - total
        - page
        - totalPages

    AnalyticsSummary:
      type: object
      properties:
        totalUsers:
          type: integer
        activeUsers:
          type: integer
        totalMovies:
          type: integer
        activeMovies:
          type: integer
        totalRequests:
          type: integer
        todayRequests:
          type: integer
        todayNewUsers:
          type: integer
        weeklyGrowth:
          type: number
      required:
        - totalUsers
        - activeUsers
        - totalMovies
        - activeMovies
        - totalRequests
        - todayRequests
        - todayNewUsers
        - weeklyGrowth

    DailyStat:
      type: object
      properties:
        date:
          type: string
        newUsers:
          type: integer
        requests:
          type: integer
      required:
        - date
        - newUsers
        - requests

    TopMovie:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        views:
          type: integer
        category:
          type: string
      required:
        - id
        - title
        - views

    BroadcastBody:
      type: object
      properties:
        message:
          type: string
        type:
          type: string
          enum: [text, photo, video]
        mediaUrl:
          type: string
        targetFilter:
          type: string
          enum: [all, active, new]
      required:
        - message
        - type

    BroadcastResult:
      type: object
      properties:
        success:
          type: boolean
        sent:
          type: integer
        failed:
          type: integer
        broadcastId:
          type: integer
      required:
        - success
        - sent
        - failed

    BroadcastRecord:
      type: object
      properties:
        id:
          type: integer
        message:
          type: string
        type:
          type: string
        sent:
          type: integer
        failed:
          type: integer
        sentAt:
          type: string
      required:
        - id
        - message
        - type
        - sent
        - failed
        - sentAt

    Category:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        nameUz:
          type: string
        movieCount:
          type: integer
      required:
        - id
        - name

    CreateCategoryBody:
      type: object
      properties:
        name:
          type: string
        nameUz:
          type: string
      required:
        - name

    BotSettings:
      type: object
      properties:
        welcomeMessage:
          type: string
        searchPrompt:
          type: string
        notFoundMessage:
          type: string
        requireChannelJoin:
          type: boolean
        channelUsername:
          type: string
        referralEnabled:
          type: boolean
        referralBonus:
          type: integer
        maintenanceMode:
          type: boolean
      required:
        - welcomeMessage
        - searchPrompt
        - notFoundMessage
        - requireChannelJoin
        - referralEnabled
        - maintenanceMode

    UpdateBotSettingsBody:
      type: object
      properties:
        welcomeMessage:
          type: string
        searchPrompt:
          type: string
        notFoundMessage:
          type: string
        requireChannelJoin:
          type: boolean
        channelUsername:
          type: string
        referralEnabled:
          type: boolean
        referralBonus:
          type: integer
        maintenanceMode:
          type: boolean

    BotCommand:
      type: object
      properties:
        command:
          type: string
        description:
          type: string
        enabled:
          type: boolean
      required:
        - command
        - description
        - enabled

    UpdateBotCommandsBody:
      type: object
      properties:
        commands:
          type: array
          items:
            $ref: "#/components/schemas/BotCommand"
      required:
        - commands

    BotStatus:
      type: object
      properties:
        running:
          type: boolean
        uptime:
          type: integer
        lastActivity:
          type: string
        pendingUpdates:
          type: integer
      required:
        - running
        - uptime

    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
      required:
        - success
